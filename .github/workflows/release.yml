name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14  # Apple Silicon (arm64)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh "${{ steps.version.outputs.version }}"

      - name: Read SHA256
        id: sha
        run: |
          ARCH="$(uname -m)"
          SHA=$(cat "dist/tune-server-${{ steps.version.outputs.version }}-macos-${ARCH}.tar.gz.sha256")
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tune-server-*.tar.gz
            dist/tune-server-*.tar.gz.sha256
          body: |
            ## tune-server ${{ steps.version.outputs.version }}

            ### Installation

            **Homebrew:**
            ```bash
            brew tap renesenses/tune https://github.com/renesenses/tune-macos
            brew install tune-server
            brew services start tune-server
            ```

            **Manual:**
            ```bash
            tar xzf tune-server-${{ steps.version.outputs.version }}-macos-${{ steps.sha.outputs.arch }}.tar.gz
            cd tune-server
            cp .env.example .env
            ./tune-server
            ```

            **SHA256:** `${{ steps.sha.outputs.sha256 }}`
          generate_release_notes: true

      - name: Update Homebrew formula SHA256
        run: |
          ARCH="${{ steps.sha.outputs.arch }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          VERSION="${{ steps.version.outputs.version }}"

          if [ "$ARCH" = "arm64" ]; then
            sed -i '' "s/on_arm do/on_arm do/" Formula/tune-server.rb
            # Update arm64 sha256 (first PLACEHOLDER or existing hash after on_arm)
            python3 -c "
          import re
          with open('Formula/tune-server.rb') as f:
              content = f.read()
          # Update version
          content = re.sub(r'version \".*?\"', 'version \"$VERSION\"', content)
          # Update arm64 sha256 (first sha256 after on_arm)
          parts = content.split('on_arm do')
          if len(parts) == 2:
              parts[1] = re.sub(r'sha256 \".*?\"', 'sha256 \"$SHA\"', parts[1], count=1)
              content = 'on_arm do'.join(parts)
          with open('Formula/tune-server.rb', 'w') as f:
              f.write(content)
          "
          fi

          # Commit updated formula
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tune-server.rb
          git diff --cached --quiet || git commit -m "formula: update SHA256 for v${VERSION}"
          git push origin HEAD:main || true
