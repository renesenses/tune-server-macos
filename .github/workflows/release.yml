name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14    # Apple Silicon (native)
            arch: arm64
            rosetta: false
          - runner: macos-15    # Intel via Rosetta
            arch: x86_64
            rosetta: true
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rosetta
        if: matrix.rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Setup x86_64 Homebrew
        if: matrix.rosetta
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: Install x86_64 dependencies
        if: matrix.rosetta
        run: |
          arch -x86_64 /usr/local/bin/brew install python@3.12 ffmpeg node

      - name: Setup Node.js
        if: "!matrix.rosetta"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        if: "!matrix.rosetta"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg (native)
        if: "!matrix.rosetta"
        run: brew install ffmpeg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Build (native)
        if: "!matrix.rosetta"
        run: |
          chmod +x build.sh
          ./build.sh "${{ steps.version.outputs.version }}"

      - name: Build (x86_64 via Rosetta)
        if: matrix.rosetta
        run: |
          chmod +x build.sh
          arch -x86_64 /bin/bash -c "
            export PATH=/usr/local/bin:\$PATH
            ./build.sh '${{ steps.version.outputs.version }}'
          "

      - name: Read SHA256
        id: sha
        run: |
          SHA=$(cat "dist/tune-server-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256")
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tune-server-${{ matrix.arch }}
          path: |
            dist/tune-server-*.tar.gz
            dist/tune-server-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Read SHA256 values
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM_SHA=$(cat "artifacts/tune-server-${VERSION}-macos-arm64.tar.gz.sha256")
          echo "arm64=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          # Intel SHA only if file exists
          INTEL_FILE="artifacts/tune-server-${VERSION}-macos-x86_64.tar.gz.sha256"
          if [ -f "$INTEL_FILE" ]; then
            echo "x86_64=$(cat "$INTEL_FILE")" >> "$GITHUB_OUTPUT"
          else
            echo "x86_64=N/A" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tune-server-*.tar.gz
            artifacts/tune-server-*.tar.gz.sha256
          body: |
            ## tune-server ${{ steps.version.outputs.version }}

            ### Installation

            **Homebrew:**
            ```bash
            brew tap renesenses/tune https://github.com/renesenses/tune-server-macos
            brew install tune-server
            brew services start tune-server
            ```

            **Manual (Apple Silicon):**
            ```bash
            tar xzf tune-server-${{ steps.version.outputs.version }}-macos-arm64.tar.gz
            cd tune-server && ./tune-server
            ```

            **Manual (Intel):**
            ```bash
            tar xzf tune-server-${{ steps.version.outputs.version }}-macos-x86_64.tar.gz
            cd tune-server && ./tune-server
            ```

            ### SHA256
            - **arm64:** `${{ steps.sha.outputs.arm64 }}`
            - **x86_64:** `${{ steps.sha.outputs.x86_64 }}`
          generate_release_notes: true

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM_SHA="${{ steps.sha.outputs.arm64 }}"
          INTEL_SHA="${{ steps.sha.outputs.x86_64 }}"

          python3 -c "
          import re
          with open('Formula/tune-server.rb') as f:
              content = f.read()
          content = re.sub(r'version \".*?\"', 'version \"${VERSION}\"', content)
          parts = content.split('on_arm do')
          if len(parts) == 2:
              parts[1] = re.sub(r'sha256 \".*?\"', 'sha256 \"${ARM_SHA}\"', parts[1], count=1)
              content = 'on_arm do'.join(parts)
          parts = content.split('on_intel do')
          if len(parts) == 2:
              parts[1] = re.sub(r'sha256 \".*?\"', 'sha256 \"${INTEL_SHA}\"', parts[1], count=1)
              content = 'on_intel do'.join(parts)
          with open('Formula/tune-server.rb', 'w') as f:
              f.write(content)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tune-server.rb
          git diff --cached --quiet || git commit -m "formula: update to v${VERSION}"
          git push origin HEAD:main || true
